<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnonyChat 🐾</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8eaf6;
    --muted: #7c83a3;
    --border: #2e3250;
    --green: #43d685;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== ONBOARDING SCREEN ===== */
  #onboarding {
    width: 100%;
    max-width: 480px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .logo {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }
  .logo span { font-size: 1.8rem; }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    margin-top: -16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
  }
  .card-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Avatar grid */
  .avatar-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .avatar-btn {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 2px solid transparent;
    background: var(--surface2);
    cursor: pointer;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    position: relative;
  }
  .avatar-btn:hover { border-color: var(--accent); transform: scale(1.08); }
  .avatar-btn.selected {
    border-color: var(--accent);
    background: rgba(108,99,255,0.18);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.25);
  }
  .avatar-btn.selected::after {
    content: '✓';
    position: absolute;
    top: -6px; right: -6px;
    background: var(--accent);
    color: #fff;
    font-size: 0.6rem;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* Name input */
  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .enter-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #9c94ff);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .enter-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .enter-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== CHAT SCREEN ===== */
  #chatroom {
    display: none;
    width: 100%;
    max-width: 700px;
    height: 100vh;
    max-height: 100vh;
    flex-direction: column;
  }

  .chat-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header-title { font-weight: 700; font-size: 1rem; }
  .chat-header-sub { color: var(--muted); font-size: 0.78rem; }
  .online-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-left: auto;
    flex-shrink: 0;
  }
  .online-count { color: var(--green); font-size: 0.78rem; font-weight: 600; }

  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  .messages-container::-webkit-scrollbar { width: 4px; }
  .messages-container::-webkit-scrollbar-track { background: transparent; }
  .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    padding: 3px 0;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    font-size: 1.5rem;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
  }
  .msg-bubble-wrap { max-width: 68%; display: flex; flex-direction: column; }
  .msg-row.me .msg-bubble-wrap { align-items: flex-end; }

  .msg-meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 3px;
    padding: 0 4px;
  }
  .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    padding: 10px 14px;
    font-size: 0.9rem;
    line-height: 1.45;
    word-break: break-word;
    color: var(--text);
  }
  .msg-row.me .msg-bubble {
    background: linear-gradient(135deg, var(--accent), #9c94ff);
    border-color: transparent;
    border-radius: 16px 16px 4px 16px;
    color: #fff;
  }

  .msg-time {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }

  .system-msg {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 6px 0;
    font-style: italic;
  }

  .chat-input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .my-avatar-badge {
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 18px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    resize: none;
    max-height: 100px;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), #9c94ff);
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
  }
  .send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.06); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .date-divider {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    padding: 12px 0 4px;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%; width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 10%; }
  .date-divider::after { right: 10%; }

  .toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.82rem;
    color: var(--muted);
    animation: toastIn 0.3s ease;
    z-index: 99;
    pointer-events: none;
  }
  @keyframes toastIn {
    from { opacity:0; transform: translateX(-50%) translateY(8px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width: 480px) {
    .avatar-grid { grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .avatar-btn { font-size: 1.35rem; }
    #chatroom { max-width: 100%; }
  }
</style>
</head>
<body>

<!-- ===== ONBOARDING ===== -->
<div id="onboarding">
  <div>
    <div class="logo">AnonyChat <span>🐾</span></div>
    <div class="subtitle">Anonymous • No sign-up • Just chat</div>
  </div>

  <div class="card">
    <div class="card-label">Pick your avatar</div>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>

  <div class="card">
    <div class="card-label">Choose a name</div>
    <input type="text" id="nameInput" class="name-input"
      placeholder="e.g. SilentFox, NightOwl…"
      maxlength="20" autocomplete="off" spellcheck="false">
  </div>

  <button class="enter-btn" id="enterBtn" disabled>Enter Chat Room →</button>
</div>

<!-- ===== CHAT ===== -->
<div id="chatroom">
  <div class="chat-header">
    <span id="myHeaderAvatar" style="font-size:1.4rem"></span>
    <div>
      <div class="chat-header-title">General Room</div>
      <div class="chat-header-sub" id="myHeaderName"></div>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <div class="online-dot"></div>
      <div class="online-count" id="onlineCount">Live</div>
    </div>
  </div>

  <div class="messages-container" id="msgContainer"></div>

  <div class="chat-input-bar">
    <div class="my-avatar-badge" id="myInputAvatar"></div>
    <textarea class="chat-input" id="chatInput"
      placeholder="Type a message…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const SUPABASE_URL = 'https://aaqqkaiwanmgguabeujr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcXFrYWl3YW5tZ2d1YWJldWpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2Mjc1OTYsImV4cCI6MjA4NjIwMzU5Nn0.ydoqHbVpe_xi_PFNK2OTsq0NmXlFs4J4gz6cHBy_aEA';
const ROOM_NAME    = 'General';

const AVATARS = [
  '🦊','🐺','🐻','🐼','🦁',
  '🐯','🐨','🦝','🐸','🦋',
  '🐧','🦉','🦅','🐙','🦈',
  '🦊','🐢','🦏','🦒','🦓',
  '🐬','🐳','🦜','🦩','🦦',
  '🐝','🦄','🐲','🦀','🐠'
];

// ===================== INIT =====================
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let myBrowserId = '';
let myName = '';
let myAvatar = '';
let roomId = '';
let realtimeSub = null;
let lastDateShown = '';

// Browser fingerprint (stable per browser)
function getBrowserId() {
  let id = localStorage.getItem('anony_browser_id');
  if (!id) {
    id = 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,9);
    localStorage.setItem('anony_browser_id', id);
  }
  return id;
}

// ===================== ONBOARDING =====================
const grid = document.getElementById('avatarGrid');
const nameInput = document.getElementById('nameInput');
const enterBtn = document.getElementById('enterBtn');

// Render avatar grid
AVATARS.forEach((emoji, i) => {
  const btn = document.createElement('button');
  btn.className = 'avatar-btn';
  btn.textContent = emoji;
  btn.dataset.emoji = emoji;
  btn.title = emoji;
  btn.onclick = () => {
    document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    myAvatar = emoji;
    checkReady();
  };
  grid.appendChild(btn);
});

nameInput.addEventListener('input', () => {
  myName = nameInput.value.trim();
  checkReady();
});
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !enterBtn.disabled) enterChat();
});

function checkReady() {
  enterBtn.disabled = !(myAvatar && myName.length >= 2);
}

enterBtn.addEventListener('click', enterChat);

// Restore previous session avatar preference
const savedAvatar = localStorage.getItem('anony_avatar');
const savedName   = localStorage.getItem('anony_name');
if (savedAvatar) {
  const btn = [...document.querySelectorAll('.avatar-btn')].find(b => b.dataset.emoji === savedAvatar);
  if (btn) btn.click();
}
if (savedName) {
  nameInput.value = savedName;
  myName = savedName;
  checkReady();
}

// ===================== ENTER CHAT =====================
async function enterChat() {
  enterBtn.disabled = true;
  enterBtn.textContent = 'Connecting…';

  myBrowserId = getBrowserId();
  localStorage.setItem('anony_avatar', myAvatar);
  localStorage.setItem('anony_name', myName);

  // Upsert user
  await db.from('chat_users').upsert({
    browser_id: myBrowserId,
    display_name: myName,
    avatar: myAvatar,
    last_seen: new Date().toISOString()
  }, { onConflict: 'browser_id' });

  // Get room
  let { data: rooms } = await db.from('chat_rooms').select('id,name').eq('name', ROOM_NAME).limit(1);
  if (!rooms || rooms.length === 0) {
    const { data: nr } = await db.from('chat_rooms').insert({ name: ROOM_NAME }).select().single();
    roomId = nr.id;
  } else {
    roomId = rooms[0].id;
  }

  // Switch to chat
  document.getElementById('onboarding').style.display = 'none';
  const cr = document.getElementById('chatroom');
  cr.style.display = 'flex';

  document.getElementById('myHeaderAvatar').textContent = myAvatar;
  document.getElementById('myHeaderName').textContent = myName;
  document.getElementById('myInputAvatar').textContent = myAvatar;

  const chatInput = document.getElementById('chatInput');
  const sendBtn   = document.getElementById('sendBtn');
  chatInput.disabled = false;
  sendBtn.disabled = false;
  chatInput.focus();

  // Load recent messages
  await loadMessages();

  // Subscribe realtime
  realtimeSub = db.channel('room-' + roomId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages',
      filter: `room_id=eq.${roomId}`
    }, payload => {
      appendMessage(payload.new, false);
    })
    .subscribe();

  // Send join system notice (local only)
  appendSystemMsg(`You joined as ${myAvatar} ${myName}`);

  // Update last_seen periodically
  setInterval(() => {
    db.from('chat_users').update({ last_seen: new Date().toISOString() })
      .eq('browser_id', myBrowserId);
  }, 30000);
}

// ===================== MESSAGES =====================
async function loadMessages() {
  const { data } = await db.from('chat_messages')
    .select('*')
    .eq('room_id', roomId)
    .order('created_at', { ascending: true })
    .limit(80);

  const container = document.getElementById('msgContainer');
  container.innerHTML = '';
  lastDateShown = '';

  if (data && data.length > 0) {
    data.forEach(m => appendMessage(m, true));
  } else {
    appendSystemMsg('No messages yet. Say hello! 👋');
  }
  scrollBottom();
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function formatDate(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function appendMessage(msg, skipScroll) {
  const container = document.getElementById('msgContainer');
  const isMe = msg.browser_id === myBrowserId;

  // Date divider
  const dateLabel = formatDate(msg.created_at);
  if (dateLabel !== lastDateShown) {
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = dateLabel;
    container.appendChild(div);
    lastDateShown = dateLabel;
  }

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = msg.avatar;
  avatarEl.title = msg.display_name;

  const wrap = document.createElement('div');
  wrap.className = 'msg-bubble-wrap';

  if (!isMe) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = msg.display_name;
    wrap.appendChild(meta);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.message;
  wrap.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.created_at);
  wrap.appendChild(time);

  row.appendChild(avatarEl);
  row.appendChild(wrap);
  container.appendChild(row);

  if (!skipScroll) scrollBottom();
}

function appendSystemMsg(text) {
  const container = document.getElementById('msgContainer');
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  container.appendChild(el);
  scrollBottom();
}

function scrollBottom() {
  const c = document.getElementById('msgContainer');
  c.scrollTop = c.scrollHeight;
}

// ===================== SEND =====================
async function sendMessage() {
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = chatInput.value.trim();
  if (!text) return;

  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;

  const { error } = await db.from('chat_messages').insert({
    room_id: roomId,
    browser_id: myBrowserId,
    display_name: myName,
    avatar: myAvatar,
    message: text
  });

  if (error) showToast('Failed to send. Try again.');
  sendBtn.disabled = false;
  chatInput.focus();
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  document.getElementById('sendBtn').disabled = !this.value.trim();
});

// ===================== TOAST =====================
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
