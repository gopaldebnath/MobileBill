<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>GharKhata – Family Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --border: #2a2a4a;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #f5a623;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --green: #2ecc71;
    --red: #e74c3c;
    --radius: 16px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; background: var(--bg); }
  #page-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; scroll-behavior: smooth; }
  #page-container::-webkit-scrollbar { display: none; }

  /* ── Header ── */
  .top-bar { background: var(--surface); padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
  .top-bar .brand { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .top-bar .brand span { color: var(--accent); }
  .top-bar .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .month-nav .month-label { font-size: 13px; font-weight: 600; color: var(--gold); min-width: 90px; text-align: center; }

  /* ── Bottom Nav ── */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 8px; cursor: pointer; border: none; background: transparent; color: var(--muted); font-size: 10px; font-family: var(--font); transition: color .2s; }
  .nav-btn .icon { font-size: 22px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.add-btn { position: relative; top: -18px; background: var(--accent); color: white; width: 56px; height: 56px; border-radius: 50%; flex-direction: column; padding: 0; box-shadow: 0 4px 20px rgba(233,69,96,0.5); margin: 0 8px; font-size: 26px; }
  .nav-btn.add-btn span { font-size: 26px; }

  /* ── Pages ── */
  .page { display: none; padding: 16px; animation: fadeIn .2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Summary Cards ── */
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; }
  .summary-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: currentColor; opacity: .06; }
  .summary-card.full { grid-column: 1 / -1; }
  .s-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .s-value { font-size: 22px; font-weight: 700; }
  .s-value.green { color: var(--green); }
  .s-value.red { color: var(--red); }
  .s-value.gold { color: var(--gold); }
  .s-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Budget bar ── */
  .budget-bar-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .budget-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .budget-bar-header span { font-size: 13px; font-weight: 600; }
  .budget-edit-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  .bar-track { background: var(--border); border-radius: 100px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 100px; transition: width .5s ease; background: var(--green); }
  .bar-fill.warn { background: var(--gold); }
  .bar-fill.over { background: var(--red); }
  .bar-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted); }

  /* ── Section header ── */
  .sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .sec-title { font-size: 15px; font-weight: 700; }
  .see-all { font-size: 12px; color: var(--accent); cursor: pointer; }

  /* ── Expense List ── */
  .expense-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; position: relative; }
  .exp-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .exp-info { flex: 1; min-width: 0; }
  .exp-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .exp-amount { font-size: 16px; font-weight: 700; color: var(--accent); }
  .exp-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; border-radius: 8px; }
  .exp-del:active { background: rgba(233,69,96,.15); color: var(--red); }
  .date-divider { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; padding: 8px 0 4px; }

  /* ── Chart page ── */
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .chart-wrap { position: relative; height: 200px; }

  /* ── Category breakdown ── */
  .cat-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .cat-row:last-child { border-bottom: none; }
  .cat-icon-sm { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .cat-info { flex: 1; }
  .cat-name { font-size: 13px; font-weight: 600; }
  .cat-bar { height: 4px; background: var(--border); border-radius: 100px; margin-top: 5px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 100px; }
  .cat-amount { font-size: 14px; font-weight: 700; color: var(--text); }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; padding: 20px 20px 36px; max-height: 90dvh; overflow-y: auto; animation: slideUp .25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* ── Form elements ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; padding: 12px 14px; font-family: var(--font); outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .amount-input { font-size: 28px; font-weight: 700; text-align: center; color: var(--gold); letter-spacing: -1px; }
  .cat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .cat-chip { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-size: 10px; color: var(--muted); transition: all .15s; }
  .cat-chip .ce { font-size: 20px; }
  .cat-chip.selected { border-color: var(--accent); background: rgba(233,69,96,.1); color: var(--text); }
  .pay-row { display: flex; gap: 8px; }
  .pay-chip { flex: 1; background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 8px; text-align: center; font-size: 12px; cursor: pointer; color: var(--muted); }
  .pay-chip.selected { border-color: var(--gold); color: var(--gold); background: rgba(245,166,35,.08); }
  .btn-primary { width: 100%; background: var(--accent); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .3px; font-family: var(--font); }
  .btn-primary:active { opacity: .85; }
  .btn-outline { width: 100%; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 14px; padding: 14px; font-size: 15px; cursor: pointer; font-family: var(--font); margin-top: 8px; }

  /* ── Toast ── */
  #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--green); color: white; padding: 10px 22px; border-radius: 100px; font-size: 14px; font-weight: 600; z-index: 999; transition: transform .3s ease; white-space: nowrap; }
  #toast.error { background: var(--red); }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .e-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── Loader ── */
  .loader { display: flex; justify-content: center; padding: 30px; }
  .spin { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* budget modal */
  .budget-form-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="brand">Ghar<span>Khata</span></div>
    <div class="month-nav">
      <button onclick="shiftMonth(-1)">‹</button>
      <div class="month-label" id="month-label">Jun 2026</div>
      <button onclick="shiftMonth(1)">›</button>
    </div>
  </div>

  <div id="page-container">
    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
      <div class="summary-row">
        <div class="summary-card">
          <div class="s-label">Spent</div>
          <div class="s-value red" id="total-spent">₹0</div>
          <div class="s-sub" id="spent-count">0 transactions</div>
        </div>
        <div class="summary-card">
          <div class="s-label">Remaining</div>
          <div class="s-value green" id="remaining">₹0</div>
          <div class="s-sub" id="budget-label">Budget not set</div>
        </div>
      </div>

      <div class="budget-bar-wrap">
        <div class="budget-bar-header">
          <span>Monthly Budget</span>
          <button class="budget-edit-btn" onclick="openBudgetModal()">✏️ Edit</button>
        </div>
        <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
        <div class="bar-labels">
          <span id="bar-pct">0%</span>
          <span id="bar-total">Budget: ₹0</span>
        </div>
      </div>

      <div class="sec-header">
        <div class="sec-title">Recent Transactions</div>
        <div class="see-all" onclick="navTo('history')">See all ›</div>
      </div>
      <div id="recent-list"><div class="loader"><div class="spin"></div></div></div>
    </div>

    <!-- ANALYSIS PAGE -->
    <div class="page" id="page-analysis">
      <div class="chart-card">
        <div class="chart-title">Daily Spending – <span id="chart-month-label">Jun 2026</span></div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">By Category</div>
        <div style="display:flex;gap:12px;align-items:center">
          <div style="width:130px;height:130px;flex-shrink:0"><canvas id="doughnutChart"></canvas></div>
          <div id="cat-legend" style="flex:1"></div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Category Breakdown</div>
        <div id="cat-breakdown"></div>
      </div>
    </div>

    <!-- HISTORY PAGE -->
    <div class="page" id="page-history">
      <div id="history-list"><div class="loader"><div class="spin"></div></div></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="navTo('home')">
      <span class="icon">🏠</span><span>Home</span>
    </button>
    <button class="nav-btn" id="nav-analysis" onclick="navTo('analysis')">
      <span class="icon">📊</span><span>Analysis</span>
    </button>
    <button class="nav-btn add-btn" onclick="openAddModal()">
      <span>+</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="navTo('history')">
      <span class="icon">📋</span><span>History</span>
    </button>
    <button class="nav-btn" id="nav-budget" onclick="openBudgetModal()">
      <span class="icon">💰</span><span>Budget</span>
    </button>
  </nav>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="add-modal" onclick="closeOnBg(event,'add-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Expense</div>
    <div class="form-group">
      <label class="form-label">Amount (₹)</label>
      <input type="number" class="form-input amount-input" id="inp-amount" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <input type="text" class="form-input" id="inp-desc" placeholder="e.g. Dinner at restaurant">
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input type="date" class="form-input" id="inp-date">
    </div>
    <div class="form-group">
      <label class="form-label">Payment Mode</label>
      <div class="pay-row">
        <div class="pay-chip selected" data-mode="cash">💵 Cash</div>
        <div class="pay-chip" data-mode="upi">📱 UPI</div>
        <div class="pay-chip" data-mode="card">💳 Card</div>
        <div class="pay-chip" data-mode="netbanking">🏦 Net</div>
      </div>
    </div>
    <button class="btn-primary" onclick="saveExpense()">Save Expense</button>
    <button class="btn-outline" onclick="closeModal('add-modal')">Cancel</button>
  </div>
</div>

<!-- BUDGET MODAL -->
<div class="modal-overlay" id="budget-modal" onclick="closeOnBg(event,'budget-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Set Monthly Budget</div>
    <div class="form-group">
      <label class="form-label">Budget Amount (₹)</label>
      <input type="number" class="form-input amount-input" id="inp-budget" placeholder="0" inputmode="decimal">
    </div>
    <div class="budget-form-note" id="budget-month-note"></div>
    <button class="btn-primary" onclick="saveBudget()">Set Budget</button>
    <button class="btn-outline" onclick="closeModal('budget-modal')">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast">Saved!</div>

<script>
const SUPABASE_URL = 'https://aaqqkaiwanmgguabeujr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcXFrYWl3YW5tZ2d1YWJldWpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2Mjc1OTYsImV4cCI6MjA4NjIwMzU5Nn0.ydoqHbVpe_xi_PFNK2OTsq0NmXlFs4J4gz6cHBy_aEA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ──
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth() + 1; // 1-based
let categories = [];
let expenses = [];
let budget = 0;
let selCatId = null;
let selPayMode = 'cash';
let barChartInst = null;
let doughnutInst = null;

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Init ──
async function init() {
  setMonthLabel();
  await loadCategories();
  buildCatGrid();
  await loadData();
}

function setMonthLabel() {
  const lbl = `${MONTH_NAMES[curMonth-1]} ${curYear}`;
  document.getElementById('month-label').textContent = lbl;
  document.getElementById('chart-month-label').textContent = lbl;
  document.getElementById('budget-month-note').textContent = `Budget for ${lbl}`;
}

async function loadCategories() {
  const { data } = await sb.from('expense_categories').select('*').order('id');
  categories = data || [];
}

async function loadData() {
  const startDate = `${curYear}-${String(curMonth).padStart(2,'0')}-01`;
  const lastDay = new Date(curYear, curMonth, 0).getDate();
  const endDate = `${curYear}-${String(curMonth).padStart(2,'0')}-${lastDay}`;

  const [expRes, budRes] = await Promise.all([
    sb.from('expenses').select('*, expense_categories(name,icon,color)').gte('expense_date', startDate).lte('expense_date', endDate).order('expense_date', {ascending:false}),
    sb.from('monthly_budget').select('budget_amount').eq('month', curMonth).eq('year', curYear).maybeSingle()
  ]);

  expenses = expRes.data || [];
  budget = budRes.data?.budget_amount || 0;

  renderHome();
  renderAnalysis();
  renderHistory();
}

function shiftMonth(d) {
  curMonth += d;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  setMonthLabel();
  loadData();
}

// ── HOME ──
function renderHome() {
  const total = expenses.reduce((s,e) => s + parseFloat(e.amount), 0);
  const rem   = budget - total;
  const pct   = budget > 0 ? Math.min(100, (total/budget)*100) : 0;

  document.getElementById('total-spent').textContent = fmt(total);
  document.getElementById('spent-count').textContent = `${expenses.length} transaction${expenses.length!==1?'s':''}`;
  document.getElementById('remaining').textContent = fmt(Math.abs(rem));
  document.getElementById('remaining').className = `s-value ${rem >= 0 ? 'green' : 'red'}`;
  document.getElementById('budget-label').textContent = budget > 0 ? `of ₹${fmt(budget)} budget` : 'Budget not set';
  document.getElementById('bar-fill').style.width = pct + '%';
  document.getElementById('bar-fill').className = `bar-fill ${pct >= 100 ? 'over' : pct >= 80 ? 'warn' : ''}`;
  document.getElementById('bar-pct').textContent = Math.round(pct) + '%';
  document.getElementById('bar-total').textContent = `Budget: ${fmt(budget)}`;

  const recent = expenses.slice(0, 8);
  const el = document.getElementById('recent-list');
  el.innerHTML = recent.length ? buildExpenseListHTML(recent) : `<div class="empty-state"><div class="e-icon">💸</div><p>No expenses this month.<br>Tap + to add one.</p></div>`;
}

function buildExpenseListHTML(list) {
  let html = '';
  let lastDate = '';
  for (const e of list) {
    const dStr = formatDateLabel(e.expense_date);
    if (dStr !== lastDate) {
      html += `<div class="date-divider">${dStr}</div>`;
      lastDate = dStr;
    }
    const cat = e.expense_categories || {};
    html += `<div class="expense-item">
      <div class="exp-icon" style="background:${cat.color||'#333'}22">${cat.icon||'📦'}</div>
      <div class="exp-info">
        <div class="exp-name">${esc(e.description || cat.name || 'Expense')}</div>
        <div class="exp-meta">${cat.name||''} · ${capitalize(e.payment_mode||'cash')}</div>
      </div>
      <div class="exp-amount">₹${fmt(e.amount)}</div>
      <button class="exp-del" onclick="deleteExpense(${e.id})">✕</button>
    </div>`;
  }
  return html;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = expenses.length ? buildExpenseListHTML(expenses) : `<div class="empty-state"><div class="e-icon">📋</div><p>No records for this month.</p></div>`;
}

// ── ANALYSIS ──
function renderAnalysis() {
  renderBarChart();
  renderDoughnut();
  renderCatBreakdown();
}

function renderBarChart() {
  const lastDay = new Date(curYear, curMonth, 0).getDate();
  const daily = Array(lastDay).fill(0);
  for (const e of expenses) {
    const d = parseInt(e.expense_date.split('-')[2]) - 1;
    daily[d] += parseFloat(e.amount);
  }
  const labels = Array.from({length:lastDay}, (_,i) => i+1);
  const ctx = document.getElementById('barChart').getContext('2d');
  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: daily,
        backgroundColor: daily.map(v => v > 0 ? 'rgba(233,69,96,0.7)' : 'rgba(233,69,96,0.1)'),
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '₹' + ctx.parsed.y.toLocaleString('en-IN') } } },
      scales: {
        x: { ticks: { color: '#7a7a9a', font: {size:9} }, grid: { display: false } },
        y: { ticks: { color: '#7a7a9a', font: {size:9}, callback: v => '₹'+v }, grid: { color: '#2a2a4a' } }
      }
    }
  });
}

function renderDoughnut() {
  const catTotals = {};
  for (const e of expenses) {
    const cid = e.category_id;
    catTotals[cid] = (catTotals[cid]||0) + parseFloat(e.amount);
  }
  const cats = categories.filter(c => catTotals[c.id]);
  const vals = cats.map(c => catTotals[c.id]);
  const colors = cats.map(c => c.color);

  const ctx = document.getElementById('doughnutChart').getContext('2d');
  if (doughnutInst) doughnutInst.destroy();
  if (!cats.length) { ctx.canvas.parentElement.innerHTML = '<div style="text-align:center;color:#7a7a9a;padding:40px 0;font-size:13px">No data</div>'; return; }

  doughnutInst = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: cats.map(c=>c.name), datasets: [{ data: vals, backgroundColor: colors, borderWidth: 2, borderColor: '#16213e' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ₹${ctx.parsed.toLocaleString('en-IN')}` } } }
    }
  });

  // legend
  const leg = document.getElementById('cat-legend');
  leg.innerHTML = cats.slice(0,6).map(c => `<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
    <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0;display:inline-block"></span>
    <span style="font-size:11px;color:#e8e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</span>
    <span style="font-size:11px;font-weight:700;color:#f5a623;margin-left:auto;flex-shrink:0">₹${Math.round(catTotals[c.id]).toLocaleString('en-IN')}</span>
  </div>`).join('');
}

function renderCatBreakdown() {
  const catTotals = {};
  for (const e of expenses) catTotals[e.category_id] = (catTotals[e.category_id]||0) + parseFloat(e.amount);
  const total = Object.values(catTotals).reduce((s,v)=>s+v,0);
  const sorted = categories.filter(c=>catTotals[c.id]).sort((a,b)=>catTotals[b.id]-catTotals[a.id]);
  const el = document.getElementById('cat-breakdown');
  if (!sorted.length) { el.innerHTML = '<div style="text-align:center;color:#7a7a9a;padding:20px;font-size:13px">No data yet</div>'; return; }
  el.innerHTML = sorted.map(c => {
    const amt = catTotals[c.id];
    const pct = total > 0 ? (amt/total)*100 : 0;
    return `<div class="cat-row">
      <div class="cat-icon-sm" style="background:${c.color}22">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="cat-amount">₹${Math.round(amt).toLocaleString('en-IN')}</div>
        <div style="font-size:10px;color:#7a7a9a">${Math.round(pct)}%</div>
      </div>
    </div>`;
  }).join('');
}

// ── ADD EXPENSE ──
function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = categories.map(c => `
    <div class="cat-chip" data-id="${c.id}" onclick="selectCat(${c.id})">
      <span class="ce">${c.icon}</span>
      <span>${c.name.split(' ')[0]}</span>
    </div>`).join('');
}

function selectCat(id) {
  selCatId = id;
  document.querySelectorAll('.cat-chip').forEach(el => el.classList.toggle('selected', parseInt(el.dataset.id) === id));
}

function openAddModal() {
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-date').value = todayStr();
  selCatId = null;
  selPayMode = 'cash';
  document.querySelectorAll('.cat-chip').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.pay-chip').forEach(el => { el.classList.toggle('selected', el.dataset.mode === 'cash'); });
  document.querySelectorAll('.pay-chip').forEach(el => el.onclick = () => { selPayMode = el.dataset.mode; document.querySelectorAll('.pay-chip').forEach(p=>p.classList.toggle('selected',p===el)); });
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('inp-amount').focus(), 300);
}

async function saveExpense() {
  const amt = parseFloat(document.getElementById('inp-amount').value);
  const desc = document.getElementById('inp-desc').value.trim();
  const date = document.getElementById('inp-date').value;
  if (!amt || amt <= 0) { showToast('Enter a valid amount', true); return; }
  if (!selCatId) { showToast('Select a category', true); return; }
  if (!date) { showToast('Select a date', true); return; }
  const { error } = await sb.from('expenses').insert({ amount: amt, category_id: selCatId, description: desc||null, expense_date: date, payment_mode: selPayMode });
  if (error) { showToast('Error saving: ' + error.message, true); return; }
  closeModal('add-modal');
  showToast('✓ Expense saved!');
  await loadData();
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  await sb.from('expenses').delete().eq('id', id);
  showToast('Deleted');
  await loadData();
}

// ── BUDGET ──
function openBudgetModal() {
  document.getElementById('inp-budget').value = budget > 0 ? budget : '';
  document.getElementById('budget-modal').classList.add('open');
}

async function saveBudget() {
  const amt = parseFloat(document.getElementById('inp-budget').value);
  if (!amt || amt <= 0) { showToast('Enter a valid budget', true); return; }
  const { error } = await sb.from('monthly_budget').upsert({ month: curMonth, year: curYear, budget_amount: amt }, { onConflict: 'month,year' });
  if (error) { showToast('Error: ' + error.message, true); return; }
  closeModal('budget-modal');
  showToast('✓ Budget set!');
  await loadData();
}

// ── NAV ──
function navTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn:not(.add-btn)').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  document.getElementById('page-container').scrollTo(0, 0);
}

// ── UTILS ──
function fmt(n) { return parseFloat(n || 0).toLocaleString('en-IN', {minimumFractionDigits:0, maximumFractionDigits:0}); }
function esc(s) { return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function todayStr() { return new Date().toISOString().split('T')[0]; }

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d.getTime() === today.getTime()) return 'Today';
  if (d.getTime() === yesterday.getTime()) return 'Yesterday';
  return d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOnBg(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = err ? 'error' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
